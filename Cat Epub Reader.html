<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cat Epub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="store.jsx"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:#f5f5f5}
:root{
  --bg:#ffffff;--surface:#f7f7f7;--border:#e8e8e8;--border2:#d0d0d0;
  --text:#111111;--text2:#555555;--text3:#999999;
  --sidebar:240px;--radius:12px;--radius-sm:8px;
}
.dark{--bg:#111111;--surface:#1a1a1a;--border:#2a2a2a;--border2:#333333;--text:#f0f0f0;--text2:#999999;--text3:#555555}
.sepia{--bg:#f4efe6;--surface:#ede8df;--border:#d8d0c0;--border2:#c8c0b0;--text:#2c2418;--text2:#6b5c48;--text3:#9c8c78}
scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── CAT SVGs ──────────────────────────────────────────────────────── */
const CatLogo = ({ size = 32 }) => (
  <svg width={size} height={size} viewBox="0 0 40 40" fill="currentColor">
    <ellipse cx="20" cy="26" rx="13" ry="11"/>
    <ellipse cx="20" cy="14" rx="11" ry="10"/>
    <polygon points="10,7 6,1 14,6"/>
    <polygon points="30,7 34,1 26,6"/>
    <circle cx="15" cy="12" r="2.5" fill="var(--bg)"/>
    <circle cx="25" cy="12" r="2.5" fill="var(--bg)"/>
    <circle cx="15.8" cy="12.8" r="1.2" fill="var(--text)"/>
    <circle cx="25.8" cy="12.8" r="1.2" fill="var(--text)"/>
    <path d="M17 17 Q20 19.5 23 17" stroke="var(--bg)" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
  </svg>
);

const CatEmpty = ({ size = 80 }) => (
  <svg width={size} height={size} viewBox="0 0 80 80" fill="currentColor" opacity="0.12">
    <ellipse cx="40" cy="52" rx="22" ry="18"/>
    <ellipse cx="40" cy="26" rx="18" ry="16"/>
    <polygon points="24,13 19,3 30,11"/>
    <polygon points="56,13 61,3 50,11"/>
    <circle cx="33" cy="23" r="4" fill="var(--bg)"/>
    <circle cx="47" cy="23" r="4" fill="var(--bg)"/>
    <path d="M36 31 Q40 34 44 31" stroke="var(--bg)" strokeWidth="2" fill="none" strokeLinecap="round"/>
    <path d="M30 40 Q40 50 50 40 Q40 60 30 40Z" fill="var(--bg)" opacity="0.5"/>
    <text x="28" y="72" fontSize="10" fontFamily="'Pixelify Sans'" fill="var(--text)" opacity="0.7">zzz</text>
  </svg>
);

const CatReading = ({ size = 60 }) => (
  <svg width={size} height={size} viewBox="0 0 60 60" fill="currentColor">
    <ellipse cx="30" cy="40" rx="18" ry="14"/>
    <ellipse cx="30" cy="20" rx="15" ry="13"/>
    <polygon points="17,10 13,2 22,8"/>
    <polygon points="43,10 47,2 38,8"/>
    <path d="M23 18 Q26 15 29 18" stroke="var(--bg)" strokeWidth="2" fill="none" strokeLinecap="round"/>
    <path d="M31 18 Q34 15 37 18" stroke="var(--bg)" strokeWidth="2" fill="none" strokeLinecap="round"/>
    <rect x="14" y="42" width="32" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
    <line x1="30" y1="42" x2="30" y2="58" stroke="var(--text)" strokeWidth="1" opacity="0.3"/>
    <ellipse cx="20" cy="44" rx="4" ry="3" fill="var(--text)"/>
    <ellipse cx="40" cy="44" rx="4" ry="3" fill="var(--text)"/>
  </svg>
);

/* ── THEME TOKENS ──────────────────────────────────────────────────── */
function applyTheme(theme) {
  document.body.className = theme === 'dark' ? 'dark' : theme === 'sepia' ? 'sepia' : '';
}

/* ── COVER ─────────────────────────────────────────────────────────── */
const Cover = ({ book, width = 80, height = 112 }) => {
  const hue = book.coverHue;
  const w = typeof width === 'number' ? width : 100;
  return (
    <div style={{
      width, height, borderRadius: 6, flexShrink: 0, overflow: 'hidden', position: 'relative',
      background: `hsl(${hue}, 12%, 88%)`,
      boxShadow: '2px 3px 10px rgba(0,0,0,0.12)',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: `linear-gradient(135deg, hsl(${hue},8%,95%) 0%, hsl(${hue},12%,78%) 100%)`,
      }}/>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        flexDirection: 'column', padding: '8px 6px', gap: 4,
      }}>
        <div style={{ fontSize: Math.max(7, w * 0.09), fontFamily: "'Pixelify Sans'", fontWeight: 700, color: `hsl(${hue},20%,25%)`, lineHeight: 1.2 }}>
          {book.title}
        </div>
        <div style={{ fontSize: Math.max(6, w * 0.07), color: `hsl(${hue},15%,40%)`, lineHeight: 1.2 }}>
          {book.author}
        </div>
        <div style={{ flex: 1, display: 'flex', alignItems: 'flex-end', justifyContent: 'center', opacity: 0.3 }}>
          <CatLogo size={Math.max(16, w * 0.28)}/>
        </div>
      </div>
    </div>
  );
};

/* ── PROGRESS ──────────────────────────────────────────────────────── */
const Bar = ({ value, height = 3 }) => (
  <div style={{ width: '100%', height, background: 'var(--border)', borderRadius: 99, overflow: 'hidden' }}>
    <div style={{ width: `${value}%`, height: '100%', background: 'var(--text)', borderRadius: 99, transition: 'width .4s ease' }}/>
  </div>
);

/* ── SIDEBAR ───────────────────────────────────────────────────────── */
const Sidebar = ({ active, onNav, prefs, onToggleCollapse, isMobile, onClose }) => {
  const collapsed = prefs.sidebarCollapsed && !isMobile;
  const w = isMobile ? 260 : collapsed ? 60 : 240;

  const navItems = [
    { id: 'home',     label: 'Início',     Icon: Icons.Home },
    { id: 'library',  label: 'Biblioteca', Icon: Icons.Book },
    { id: 'search',   label: 'Buscar',     Icon: Icons.Search },
    { id: 'settings', label: 'Config.',    Icon: Icons.Settings },
  ];

  return (
    <aside style={{
      width: w, height: '100%', flexShrink: 0,
      background: 'var(--surface)', borderRight: '1px solid var(--border)',
      display: 'flex', flexDirection: 'column',
      transition: 'width .2s ease',
      overflow: 'hidden',
      position: isMobile ? 'absolute' : 'relative',
      zIndex: isMobile ? 50 : 'auto',
      top: 0, left: 0, bottom: 0,
    }}>
      {/* Logo */}
      <div style={{
        height: 60, display: 'flex', alignItems: 'center',
        padding: collapsed ? '0 18px' : '0 20px',
        borderBottom: '1px solid var(--border)',
        gap: 10, flexShrink: 0,
        justifyContent: collapsed ? 'center' : 'space-between',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
          <CatLogo size={28}/>
          {!collapsed && <span style={{ fontFamily: "'Pixelify Sans'", fontWeight: 700, fontSize: 18, color: 'var(--text)', whiteSpace: 'nowrap' }}>Cat Epub</span>}
        </div>
        {isMobile ? (
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--text2)', display: 'flex', padding: 4 }}>
            <Icons.X size={18}/>
          </button>
        ) : (
          <button onClick={onToggleCollapse} style={{ background: 'none', border: 'none', color: 'var(--text3)', display: 'flex', padding: 4, flexShrink: 0 }}>
            <Icons.Menu size={16}/>
          </button>
        )}
      </div>

      {/* Nav */}
      <nav style={{ flex: 1, padding: '12px 0', display: 'flex', flexDirection: 'column', gap: 2, overflowY: 'auto' }}>
        {navItems.map(({ id, label, Icon }) => {
          const isActive = active === id;
          return (
            <button key={id} onClick={() => { onNav(id); if (isMobile) onClose(); }} style={{
              display: 'flex', alignItems: 'center', gap: 12,
              padding: collapsed ? '10px 0' : '10px 16px',
              justifyContent: collapsed ? 'center' : 'flex-start',
              margin: '0 8px', borderRadius: 8, border: 'none',
              background: isActive ? 'var(--border)' : 'transparent',
              color: isActive ? 'var(--text)' : 'var(--text2)',
              fontWeight: isActive ? 600 : 400, fontSize: 14,
              transition: 'background .15s, color .15s',
              whiteSpace: 'nowrap',
            }}>
              <Icon size={18} sw={isActive ? 2 : 1.5}/>
              {!collapsed && label}
            </button>
          );
        })}
      </nav>

      {/* Bottom: stats */}
      {!collapsed && (
        <div style={{ padding: '12px 16px', borderTop: '1px solid var(--border)', fontSize: 11, color: 'var(--text3)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
            <Icons.Paw size={12}/>
            <span>Cat Epub v1.0</span>
          </div>
          <div>Funciona offline</div>
        </div>
      )}
    </aside>
  );
};

/* ── HOME SCREEN ───────────────────────────────────────────────────── */
const HomeScreen = ({ books, onOpen, updateBook }) => {
  const reading = books.filter(b => b.progress > 0 && b.progress < 100);
  const recent = [...books].filter(b => b.lastRead).sort((a,b) => b.lastRead > a.lastRead ? 1 : -1).slice(0, 4);
  const totalPages = books.reduce((s, b) => s + (b.currentPage || 0), 0);
  const totalBooks = books.filter(b => b.progress === 100).length;

  return (
    <div style={{ height: '100%', overflowY: 'auto', background: 'var(--bg)' }}>
      <div style={{ maxWidth: 800, margin: '0 auto', padding: '40px 32px 80px' }}>
        {/* Greeting */}
        <div style={{ marginBottom: 40 }}>
          <h1 style={{ fontSize: 28, fontWeight: 700, color: 'var(--text)', letterSpacing: '-0.5px', marginBottom: 6 }}>
            Bom dia, leitor
          </h1>
          <p style={{ color: 'var(--text2)', fontSize: 15 }}>O que vamos ler hoje?</p>
        </div>

        {/* Stats */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, marginBottom: 48 }}>
          {[
            { label: 'Páginas lidas', value: totalPages.toLocaleString(), icon: Icons.Book },
            { label: 'Concluídos', value: totalBooks, icon: Icons.Star },
            { label: 'Em progresso', value: reading.length, icon: Icons.Clock },
          ].map(({ label, value, icon: Icon }) => (
            <div key={label} style={{
              background: 'var(--surface)', borderRadius: 12, padding: '20px 20px',
              border: '1px solid var(--border)',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12, color: 'var(--text2)' }}>
                <Icon size={15} sw={1.5}/>
                <span style={{ fontSize: 12, fontWeight: 500 }}>{label}</span>
              </div>
              <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--text)', fontFamily: "'Pixelify Sans'" }}>{value}</div>
            </div>
          ))}
        </div>

        {/* Continue reading */}
        {reading.length > 0 && (
          <section style={{ marginBottom: 48 }}>
            <h2 style={{ fontSize: 13, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 16 }}>
              Continuar lendo
            </h2>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {reading.slice(0,3).map(book => (
                <button key={book.id} onClick={() => onOpen(book)} style={{
                  display: 'flex', gap: 16, alignItems: 'center',
                  background: 'var(--surface)', border: '1px solid var(--border)',
                  borderRadius: 12, padding: 16, cursor: 'pointer', textAlign: 'left',
                  transition: 'border-color .15s',
                }}>
                  <Cover book={book} width={56} height={78}/>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)', marginBottom: 3 }}>{book.title}</div>
                    <div style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 12 }}>{book.author}</div>
                    <Bar value={book.progress}/>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6, fontSize: 12, color: 'var(--text3)' }}>
                      <span>Pág. {book.currentPage} de {book.pages}</span>
                      <span>{book.progress}%</span>
                    </div>
                  </div>
                  <Icons.ArrowRight size={16} sw={1.5} style={{ color: 'var(--text3)', flexShrink: 0 }}/>
                </button>
              ))}
            </div>
          </section>
        )}

        {/* Recent */}
        {recent.length > 0 && (
          <section>
            <h2 style={{ fontSize: 13, fontWeight: 700, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 16 }}>
              Lidos recentemente
            </h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(100px, 1fr))', gap: 20 }}>
              {recent.map(book => (
                <button key={book.id} onClick={() => onOpen(book)} style={{
                  background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left', padding: 0,
                }}>
                  <Cover book={book} width="100%" height={130}/>
                  <div style={{ marginTop: 8, fontSize: 12, fontWeight: 600, color: 'var(--text)', lineHeight: 1.3 }}>{book.title}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{book.author}</div>
                </button>
              ))}
            </div>
          </section>
        )}

        {books.length === 0 && (
          <div style={{ textAlign: 'center', padding: '60px 0', color: 'var(--text3)' }}>
            <CatEmpty size={100}/>
            <div style={{ marginTop: 16, fontFamily: "'Pixelify Sans'", fontSize: 18 }}>Biblioteca vazia</div>
            <div style={{ marginTop: 8, fontSize: 14 }}>Adicione seu primeiro EPUB</div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ── LIBRARY SCREEN ────────────────────────────────────────────────── */
const LibraryScreen = ({ books, onOpen, deleteBook, addBook }) => {
  const [filter, setFilter] = useState('all');
  const [sort, setSort] = useState('lastRead');
  const [view, setView] = useState('grid');
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef();

  const categories = useMemo(() => ['all', ...new Set(books.map(b => b.category))], [books]);

  const filtered = useMemo(() => {
    let list = filter === 'all' ? books : books.filter(b => b.category === filter);
    if (sort === 'title') list = [...list].sort((a,b) => a.title.localeCompare(b.title));
    else if (sort === 'progress') list = [...list].sort((a,b) => b.progress - a.progress);
    else if (sort === 'lastRead') list = [...list].sort((a,b) => (b.lastRead||'') > (a.lastRead||'') ? 1 : -1);
    return list;
  }, [books, filter, sort]);

  const handleFile = (file) => {
    if (!file) return;
    const newBook = {
      id: `b${Date.now()}`, title: file.name.replace(/\.epub$/i,''), author: 'Desconhecido',
      progress: 0, pages: 200, currentPage: 0, category: 'Importado',
      rating: 0, addedAt: new Date().toISOString().slice(0,10), lastRead: null,
      description: 'Livro importado', coverHue: Math.floor(Math.random()*360),
      bookmarks: [], notes: [],
    };
    addBook(newBook);
  };

  return (
    <div style={{ height: '100%', overflowY: 'auto', background: 'var(--bg)' }}>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '40px 32px 80px' }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28, flexWrap: 'wrap', gap: 12 }}>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: 'var(--text)' }}>Biblioteca</h1>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button onClick={() => setView(v => v === 'grid' ? 'list' : 'grid')} style={{
              padding: '7px 12px', border: '1px solid var(--border)', borderRadius: 8,
              background: 'none', color: 'var(--text2)', display: 'flex', alignItems: 'center', gap: 6, fontSize: 13,
            }}>
              {view === 'grid' ? <Icons.List size={15}/> : <Icons.Book size={15}/>}
            </button>
            <select value={sort} onChange={e => setSort(e.target.value)} style={{
              padding: '7px 10px', border: '1px solid var(--border)', borderRadius: 8,
              background: 'var(--bg)', color: 'var(--text2)', fontSize: 13, outline: 'none',
            }}>
              <option value="lastRead">Recentes</option>
              <option value="title">Título</option>
              <option value="progress">Progresso</option>
            </select>
            <button onClick={() => fileRef.current.click()} style={{
              display: 'flex', alignItems: 'center', gap: 6,
              padding: '7px 14px', border: '1px solid var(--border)', borderRadius: 8,
              background: 'var(--text)', color: 'var(--bg)', fontSize: 13, fontWeight: 600,
            }}>
              <Icons.Plus size={15} sw={2}/>
              Adicionar
            </button>
            <input ref={fileRef} type="file" accept=".epub" style={{ display: 'none' }}
              onChange={e => handleFile(e.target.files[0])}/>
          </div>
        </div>

        {/* Upload drop zone */}
        <div
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
          onClick={() => fileRef.current.click()}
          style={{
            border: `2px dashed ${dragOver ? 'var(--text)' : 'var(--border)'}`,
            borderRadius: 12, padding: '24px', marginBottom: 28,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12,
            cursor: 'pointer', background: dragOver ? 'var(--surface)' : 'transparent',
            transition: 'all .15s', color: 'var(--text3)',
          }}>
          <Icons.Upload size={18}/>
          <span style={{ fontSize: 14 }}>Arraste um arquivo <strong style={{ color: 'var(--text2)' }}>.epub</strong> ou clique para importar</span>
        </div>

        {/* Category tabs */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 24, flexWrap: 'wrap' }}>
          {categories.map(cat => (
            <button key={cat} onClick={() => setFilter(cat)} style={{
              padding: '5px 14px', borderRadius: 99, border: '1px solid var(--border)',
              background: filter === cat ? 'var(--text)' : 'transparent',
              color: filter === cat ? 'var(--bg)' : 'var(--text2)',
              fontSize: 13, fontWeight: filter === cat ? 600 : 400,
              transition: 'all .15s',
            }}>
              {cat === 'all' ? 'Todos' : cat}
            </button>
          ))}
        </div>

        {/* Book grid */}
        {filtered.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '60px 0', color: 'var(--text3)' }}>
            <CatEmpty size={80}/>
            <div style={{ marginTop: 12, fontFamily: "'Pixelify Sans'", fontSize: 16 }}>Nenhum livro aqui</div>
          </div>
        ) : view === 'grid' ? (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))', gap: 24 }}>
            {filtered.map(book => (
              <div key={book.id}>
                <button onClick={() => onOpen(book)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, width: '100%' }}>
                  <Cover book={book} width="100%" height={150}/>
                  <div style={{ marginTop: 8, textAlign: 'left' }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)', lineHeight: 1.3 }}>{book.title}</div>
                    <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{book.author}</div>
                    {book.progress > 0 && <div style={{ marginTop: 6 }}><Bar value={book.progress}/></div>}
                  </div>
                </button>
              </div>
            ))}
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {filtered.map(book => (
              <div key={book.id} style={{
                display: 'flex', gap: 14, alignItems: 'center',
                padding: '12px 16px', background: 'var(--surface)',
                border: '1px solid var(--border)', borderRadius: 10,
              }}>
                <Cover book={book} width={44} height={62}/>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text)' }}>{book.title}</div>
                  <div style={{ fontSize: 12, color: 'var(--text2)', marginTop: 1 }}>{book.author}</div>
                  <div style={{ display: 'flex', gap: 8, marginTop: 6, alignItems: 'center' }}>
                    <span style={{ fontSize: 11, color: 'var(--text3)', padding: '2px 8px', background: 'var(--border)', borderRadius: 6 }}>{book.category}</span>
                    <span style={{ fontSize: 11, color: 'var(--text3)' }}>{book.pages} pág.</span>
                  </div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8 }}>
                  <button onClick={() => onOpen(book)} style={{
                    padding: '6px 14px', background: 'var(--text)', color: 'var(--bg)',
                    border: 'none', borderRadius: 7, fontSize: 12, fontWeight: 600,
                  }}>Ler</button>
                  {book.progress > 0 && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, width: 100 }}>
                      <Bar value={book.progress}/>
                      <span style={{ fontSize: 11, color: 'var(--text3)', whiteSpace: 'nowrap' }}>{book.progress}%</span>
                    </div>
                  )}
                </div>
                <button onClick={() => deleteBook(book.id)} style={{ background: 'none', border: 'none', color: 'var(--text3)', padding: 4 }}>
                  <Icons.Trash size={15}/>
                </button>
              </div>
            ))}
          </div>
        )}
      </div>

/* ── SEARCH SCREEN ─────────────────────────────────────────────────── */
const SearchScreen = ({ books, onOpen }) => {
  const [q, setQ] = useState('');
  const results = useMemo(() => {
    if (!q.trim()) return [];
    const lower = q.toLowerCase();
    return books.filter(b =>
      b.title.toLowerCase().includes(lower) ||
      b.author.toLowerCase().includes(lower) ||
      b.category.toLowerCase().includes(lower)
    );
  }, [q, books]);

  return (
    <div style={{ height: '100%', overflowY: 'auto', background: 'var(--bg)' }}>
      <div style={{ maxWidth: 700, margin: '0 auto', padding: '40px 32px 80px' }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: 'var(--text)', marginBottom: 24 }}>Buscar</h1>
        <div style={{ position: 'relative', marginBottom: 32 }}>
          <div style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', color: 'var(--text3)' }}>
            <Icons.Search size={18}/>
          </div>
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Título, autor, categoria..."
            autoFocus
            style={{
              width: '100%', padding: '13px 14px 13px 44px',
              border: '1px solid var(--border)', borderRadius: 12,
              background: 'var(--surface)', color: 'var(--text)',
              fontSize: 16, outline: 'none',
            }}/>
        </div>

        {q && results.length === 0 && (
          <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--text3)' }}>
            <CatEmpty size={64}/>
            <div style={{ marginTop: 12, fontFamily: "'Pixelify Sans'", fontSize: 16 }}>Nenhum resultado</div>
          </div>
        )}

        {!q && (
          <div style={{ color: 'var(--text3)', fontSize: 14, textAlign: 'center', paddingTop: 40 }}>
            <CatReading size={64}/>
            <div style={{ marginTop: 16, fontFamily: "'Pixelify Sans'" }}>Pesquise sua biblioteca</div>
          </div>
        )}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {results.map(book => (
            <button key={book.id} onClick={() => onOpen(book)} style={{
              display: 'flex', gap: 14, alignItems: 'center', textAlign: 'left',
              padding: '12px 16px', background: 'var(--surface)',
              border: '1px solid var(--border)', borderRadius: 10, cursor: 'pointer',
            }}>
              <Cover book={book} width={44} height={62}/>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)' }}>{book.title}</div>
                <div style={{ fontSize: 13, color: 'var(--text2)', marginTop: 2 }}>{book.author}</div>
                <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 4 }}>{book.category} · {book.pages} pág.</div>
              </div>
              <Icons.ChevronRight size={16}/>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── APP ROOT ──────────────────────────────────────────────────────── */
const App = () => {
  const { books, prefs, session, updateBook, addBook, deleteBook, toggleBookmark, addNote, deleteNote, updatePref, setReadingSession } = useStore();
  const [screen, setScreen] = useState('home');
  const [openBook, setOpenBook] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  // Restore last session
  useEffect(() => {
    if (session?.bookId) {
      const b = books.find(b => b.id === session.bookId);
      if (b) { setOpenBook(b); setScreen('reader'); }
    }
  }, []);

  useEffect(() => {
    applyTheme(prefs.theme);
  }, [prefs.theme]);

  useEffect(() => {
    const ro = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', ro);
    return () => window.removeEventListener('resize', ro);
  }, []);

  const handleOpen = useCallback((book) => {
    setOpenBook(book);
    setScreen('reader');
    setReadingSession(book.id, book.currentPage || 1);
  }, [setReadingSession]);

  const handleBack = useCallback(() => {
    setScreen('home');
    setOpenBook(null);
    setReadingSession(null, null);
  }, [setReadingSession]);

  const isReader = screen === 'reader' && openBook;

  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', background: 'var(--bg)' }}>
      {/* Desktop sidebar */}
      {!isMobile && !isReader && (
        <Sidebar
          active={screen} onNav={setScreen} prefs={prefs}
          onToggleCollapse={() => updatePref('sidebarCollapsed', !prefs.sidebarCollapsed)}
          isMobile={false}
        />
      )}

      {/* Mobile sidebar overlay */}
      {isMobile && sidebarOpen && (
        <>
          <div onClick={() => setSidebarOpen(false)} style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.3)', zIndex: 45,
          }}/>
          <Sidebar active={screen} onNav={setScreen} prefs={prefs}
            onToggleCollapse={() => {}}
            isMobile={true} onClose={() => setSidebarOpen(false)}/>
        </>
      )}

      {/* Main content */}
      <main style={{ flex: 1, height: '100%', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {/* Mobile top bar (not in reader) */}
        {isMobile && !isReader && (
          <div style={{
            height: 52, flexShrink: 0, display: 'flex', alignItems: 'center',
            padding: '0 16px', borderBottom: '1px solid var(--border)',
            background: 'var(--surface)', gap: 12,
          }}>
            <button onClick={() => setSidebarOpen(true)} style={{ background: 'none', border: 'none', color: 'var(--text2)', display: 'flex', padding: 4 }}>
              <Icons.Menu size={20}/>
            </button>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: 1 }}>
              <CatLogo size={22}/>
              <span style={{ fontFamily: "'Pixelify Sans'", fontWeight: 700, fontSize: 16, color: 'var(--text)' }}>Cat Epub</span>
            </div>
          </div>
        )}

        <div style={{ flex: 1, overflow: 'hidden', paddingBottom: isMobile && !isReader ? 68 : 0 }}>
          {isReader ? (
            <ReaderScreen
              book={openBook} prefs={prefs} onBack={handleBack}
              toggleBookmark={toggleBookmark} addNote={addNote} deleteNote={deleteNote}
            />
          ) : screen === 'home' ? (
            <HomeScreen books={books} onOpen={handleOpen} updateBook={updateBook}/>
          ) : screen === 'library' ? (
            <LibraryScreen books={books} onOpen={handleOpen} deleteBook={deleteBook} addBook={addBook}/>
          ) : screen === 'search' ? (
            <SearchScreen books={books} onOpen={handleOpen}/>
          ) : (
            <SettingsScreen prefs={prefs} updatePref={updatePref}/>
          )}
        </div>

        {/* Mobile bottom nav */}
        {isMobile && !isReader && (
          <MobileNav active={screen} onNav={setScreen}/>
        )}
      </main>

      <AppTweaks prefs={prefs} updatePref={updatePref}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
